name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "37 8 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run audit fixtures
        run: ./tests/tuiweave-audit_test.sh
