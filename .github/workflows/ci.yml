name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "37 8 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
      - name: Run audit fixtures
        run: ./tests/tuiweave-audit_test.sh
      - name: Run reference sync fixtures
        run: ./tests/sync-tuiweave-reference_test.sh
